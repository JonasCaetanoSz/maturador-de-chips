<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Status Maturação</title>
    
    <script>
        // Camada protetora: impede que loops de verificação quebrem a página e cria a ponte nativa via document.title
        window.controller = {
            ask_stop_maturation: function() {
                document.title = 'cmd:stop_maturation';
            },
            open_external_url: function(url) {
                document.title = 'cmd:open_url:' + url;
            },
            getMaturationRunning: function() {
                return JSON.stringify({ status: true });
            }
        };
    </script>

    <style>
        /* 
           PALETA UNIFICADA COM AS CONFIGURAÇÕES
           Fundo: #f5f2ed | Textos: #3b2f2f / #5e3d2e | Destaques: #8b4513 / #a06b45
        */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f5f2ed;
            color: #3b2f2f;
            font-family: "Segoe UI", system-ui, sans-serif;
            zoom: 95%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 950px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(139, 69, 19, 0.08);
            border: 1px solid #eaddd3;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 80vh; /* Limita a altura para a rolagem automática funcionar */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 2px solid #f0e6dd;
            background: #ffffff;
        }

        .header h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #5e3d2e;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Botão estilizado para Cancelar Maturação */
        .cancel-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }

        .cancel-btn:hover {
            background-color: #c9302c;
        }
        
        .table-container {
            overflow-y: auto;
            flex-grow: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: #faf7f2;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 15px 25px;
            font-weight: 700;
            color: #6b4a3a;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid #eaddd3;
        }

        td {
            padding: 16px 25px;
            border-bottom: 1px solid #f0e6dd;
            font-size: 0.95rem;
        }

        tr {
            transition: background-color 0.15s ease;
        }

        tr:hover {
            background-color: #fcfbf9;
        }

        /* Badges com cores terrosas e pastéis */
        .badge {
            background-color: #f0e6dd;
            color: #8b4513;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Destinatário com um tom verde/musgo muito suave */
        .badge.receiver {
            background-color: #e8ebd9;
            color: #4a5d23;
        }

        .time {
            color: #8b796d;
            font-variant-numeric: tabular-nums;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        /* Scrollbar padronizada com as cores do app */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #faf7f2; }
        ::-webkit-scrollbar-thumb { background: #cbb7a0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a06b45; }

        /* Assinatura no canto inferior direito */
        .credits {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.75rem;
            color: #6b4a3a;
            font-family: monospace;
            background: rgba(245, 242, 237, 0.9);
            padding: 8px 14px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px rgba(139, 69, 19, 0.08);
            z-index: 100;
            border: 1px solid #eaddd3;
        }

        .credits span:hover {
            color: #8b4513 !important;
        }
    </style>
</head>
<body>

<!-- Assinatura Integrada na Ponte Nativa -->
<div class="credits">
    GitHub: <span style="cursor: pointer; text-decoration: underline; color: #b8860b; transition: color 0.2s;" onclick="controller.open_external_url('https://github.com/SouzaTDG');">ggonchoroskis</span>
</div>

<div class="card" id="historyCard">
    <div class="header">
        <h2>💬 Histórico de Mensagens</h2>
        <div class="header-actions">
            <button class="cancel-btn" onclick="controller.ask_stop_maturation();">
                🛑 Cancelar Maturação
            </button>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Remetente</th>
                    <th>Destinatário</th>
                    <th>Mensagem</th>
                    <th>Hora</th>
                </tr>
            </thead>
            <tbody id="messages-body">
                <!-- As mensagens serão injetadas aqui dinamicamente -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Função chamada pelo Python via QWebChannel ou eval direto
    window.addMessageRow = function(sender, receiver, message, time) {
        const tbody = document.getElementById("messages-body");
        const row = document.createElement("tr");
        
        row.innerHTML = `
            <td><span class="badge">${sender}</span></td>
            <td><span class="badge receiver">${receiver}</span></td>
            <td style="max-width: 400px; color: #3b2f2f;">${message}</td>
            <td class="time">${time}</td>
        `;
        
        tbody.appendChild(row);
        
        // Mantém a rolagem automática inteligente
        row.scrollIntoView({ behavior: "smooth", block: "end" });
    };

</script>
</body>
</html>
